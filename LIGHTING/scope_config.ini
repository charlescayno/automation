; ============================================================
;  RTO6 Scope Configuration File
;  Edit this file to change scope settings.
;  scope_configurator.py reads this file automatically.
;
;  Lines starting with ; or # are comments.
;  Use ON / OFF for toggles.
; ============================================================


; ── CHANNELS ─────────────────────────────────────────────────
; state    : ON | OFF
; scale    : volts per division  (e.g. 1, 0.5, 200e-3)
; position : vertical position in divisions (e.g. 0, 2, -4)
; offset   : vertical offset in volts
; coupling : DC | DCLimit | AC
; bandwidth: 500 (full) | 200 | 20   [MHz]
; color    : LIGHT_BLUE | YELLOW | PINK | GREEN | BLUE | ORANGE
; invert   : ON | OFF
; skew     : deskew in seconds (e.g. 0, 1e-9)
; rel_x_pos: label x position on screen 0–100%

[Channel_1]
state      = ON
scale      = 1
position   = 1
offset     = 0
coupling   = DCLimit
bandwidth  = 500
label      = IDS
color      = LIGHT_BLUE
rel_x_pos  = 30
invert     = OFF
skew       = 0

[Channel_2]
state      = ON
scale      = 200
position   = -4
offset     = 0
coupling   = DCLimit
bandwidth  = 500
label      = VDS
color      = YELLOW
rel_x_pos  = 40
invert     = OFF
skew       = 0

[Channel_3]
state      = OFF

[Channel_4]
state      = OFF


; ── HORIZONTAL ───────────────────────────────────────────────
; time_scale       : seconds per division (e.g. 5e-6, 1e-3)
; time_position    : trigger reference position in % (0–100)
; record_length    : number of samples (e.g. 10000, 1000000)
; acquisition_mode : NORM | AVER | PDET | HRES
; acquisition_count: number of averages (used when mode = AVER)

[Horizontal]
time_scale        = 5e-6
time_position     = 20
record_length     = 10000
acquisition_mode  = NORM
acquisition_count = 8


; ── TRIGGER ──────────────────────────────────────────────────
; type           : EDGE | WIDT | TIM | RUNT | SLEW
; source_channel : 1 | 2 | 3 | 4
; mode           : AUTO | NORM | FREERUN
; holdoff_mode   : AUTO | TIME | RAND
; holdoff_time   : seconds (used when holdoff_mode = TIME)
;
; -- EDGE settings --
; edge_level : trigger level in volts
; edge_slope : POS | NEG | EITH
;
; -- WIDTH settings --
; width_polarity : POS | NEG
; width_range    : WITHin | OUTSide | SHORter | LONGer
; width          : pulse width in seconds
; width_delta    : delta in seconds
;
; -- TIMEOUT settings --
; timeout_range : HIGH | LOW | EITHer
; timeout_time  : seconds
;
; -- RUNT settings --
; runt_polarity   : POS | NEG | EITH
; runt_high       : upper threshold in volts
; runt_low        : lower threshold in volts
; runt_delta_time : minimum runt width in seconds (0 = off)
;
; -- SLEW settings --
; slew_polarity : POS | NEG | EITH
; slew_range    : WITHin | OUTSide | SHORter | LONGer
; slew_rate     : V/s (e.g. 1e9)
; slew_delta    : delta in seconds

[Trigger]
type           = EDGE
source_channel = 1
mode           = NORM
holdoff_mode   = AUTO
holdoff_time   = 0

edge_level     = 1.0
edge_slope     = POS

width_polarity = POS
width_range    = LONGer
width          = 100e-6
width_delta    = 0

timeout_range  = HIGH
timeout_time   = 1e-3

runt_polarity  = POS
runt_high      = 3.3
runt_low       = 0.5
runt_delta_time= 0

slew_polarity  = POS
slew_range     = LONGer
slew_rate      = 1e9
slew_delta     = 0


; ── MEASUREMENTS (slots 1–8) ──────────────────────────────────
; state          : ON | OFF
; source_channel : 1 | 2 | 3 | 4
; types          : comma-separated list of measurement names
;
; Available types:
;   Amplitude : HIGH  LOW  AMPLitude  MAXimum  MINimum  PDELta
;               MEAN  RMS  STDDev  POVershoot  NOVershoot  AREA
;   Time/Freq : RTIMe  FTIMe  PPULse  NPULse  PERiod  FREQuency
;               PDCYcle  NDCYcle  BWIDth  DTOTrigger
;   Cycle     : CYCarea  CYCMean  CYCRms  CYCStddev
;   Advanced  : PHASe  DELay  PULCnt  PSWitching  NSWitching
;               PULSetrain  EDGecount  SHT  SHR  SLERising  SLEFalling

[Measurement_1]
state          = ON
source_channel = 1
types          = MAXimum, PDELta, FREQuency, PDCYcle

[Measurement_2]
state          = ON
source_channel = 2
types          = MAXimum, PDELta

[Measurement_3]
state          = OFF

[Measurement_4]
state          = OFF

[Measurement_5]
state          = OFF

[Measurement_6]
state          = OFF

[Measurement_7]
state          = OFF

[Measurement_8]
state          = OFF


; ── CURSORS (sets 1–4) ────────────────────────────────────────
; state          : ON | OFF
; type           : VERT | HOR | EITH
; source_channel : 1 | 2 | 3 | 4
; X1, X2         : horizontal positions in seconds
; Y1, Y2         : vertical positions in volts (used for HOR/EITH)

[Cursor_1]
state          = OFF
type           = VERT
source_channel = 1
X1             = 0
X2             = 1e-6
Y1             = 0
Y2             = 0

[Cursor_2]
state          = OFF
type           = VERT
source_channel = 2
X1             = 0
X2             = 1e-6
Y1             = 0
Y2             = 0

[Cursor_3]
state          = OFF

[Cursor_4]
state          = OFF


; ── DISPLAY ───────────────────────────────────────────────────
; intensity        : 0–100 %
; persistence      : OFF | INF | <seconds> (e.g. 2.5)
; persistence_decay: decay time in seconds (used when persistence = <seconds>)

[Display]
intensity         = 100
persistence       = OFF
persistence_decay = 0
